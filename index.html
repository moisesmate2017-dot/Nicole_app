<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espacio de Calma</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --shadow: #a3b1c6;
            --light: #ffffff;
            --accent: #89b4fa;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #4a5568;
            overflow: hidden; 
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 10; 
        }

        h1 { 
            font-weight: 300; 
            opacity: 0.8; 
            height: 40px; 
            transition: opacity 0.5s;
        }

        .card {
            background: var(--bg);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow), 
                       -9px -9px 16px var(--light);
            margin-bottom: 2rem;
        }

        .breathing-circle {
            width: 150px;
            height: 150px;
            margin: 2rem auto;
            background: var(--bg);
            border-radius: 50%;
            box-shadow: inset 6px 6px 12px var(--shadow), 
                        inset -6px -6px 12px var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .inner-circle {
            width: 40%;
            height: 40%;
            background: var(--accent);
            border-radius: 50%;
            filter: blur(8px);
            transition: transform 3s ease-in-out, opacity 3s ease-in-out;
            transform: scale(1);
            opacity: 0.3;
        }

        .fidget-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .fidget-btn {
            width: 100%;
            padding: 20px 0;
            border: none;
            border-radius: 15px;
            background: var(--bg);
            box-shadow: 5px 5px 10px var(--shadow), 
                       -5px -5px 10px var(--light);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.5rem; 
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .fidget-btn.active {
            box-shadow: inset 3px 3px 6px var(--shadow), 
                        inset -3px -3px 6px var(--light);
            transform: scale(0.95);
        }

        .controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            opacity: 0.7;
        }

        .volume-row {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 10px;
            font-size: 0.9rem;
        }

        input[type=range] {
            -webkit-appearance: none;
            flex-grow: 1;
            background: transparent;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-runnable-track {
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            box-shadow: inset 2px 2px 5px var(--shadow), 
                        inset -2px -2px 5px var(--light);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 2px 2px 5px var(--shadow);
        }

        .music-toggle-btn {
            background: transparent;
            border: none;
            color: #4a5568;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 10px;
            box-shadow: 3px 3px 6px var(--shadow), -3px -3px 6px var(--light);
            transition: all 0.2s ease;
        }

        .music-toggle-btn:active {
            box-shadow: inset 2px 2px 4px var(--shadow), inset -2px -2px 4px var(--light);
        }

        .rain-drop {
            position: fixed;
            top: -100px; 
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<audio id="bg-music" loop src="sparks.mp3"></audio>

<div class="container">
    <div class="card">
        <h1 id="instruction">Descansando...</h1>
        <div class="breathing-circle">
            <div class="inner-circle" id="inner-circle"></div>
        </div>
        <p class="status-text" id="status-text">Mantén presionado un botón para comenzar.</p>
    </div>

    <div class="card">
        <p>Panel Sensorial</p>
        <div class="fidget-grid">
            <button class="fidget-btn">🫧</button>
            <button class="fidget-btn">🍃</button>
            <button class="fidget-btn">✨</button>
            <button class="fidget-btn">💧</button>
            <button class="fidget-btn">☁️</button>
            <button class="fidget-btn">🌙</button>
        </div>
        
        <div class="controls-container">
            <div class="volume-row">
                <span>🔈</span>
                <input type="range" id="volume-slider" min="0" max="100" value="40">
                <span>🔊</span>
            </div>
            <button class="music-toggle-btn" id="music-toggle">Música: Esperando...</button>
        </div>
    </div>
</div>

<script>
    const textElement = document.getElementById('instruction');
    const statusText = document.getElementById('status-text');
    const circleElement = document.getElementById('inner-circle');
    const buttons = document.querySelectorAll('.fidget-btn');
    const volumeSlider = document.getElementById('volume-slider');
    
    // Elementos de música
    const bgMusic = document.getElementById('bg-music');
    const musicToggleBtn = document.getElementById('music-toggle');

    let isHolding = false;
    let breathingInterval = null;
    let rainInterval = null;
    let audioCtx = null; 
    let musicHasStarted = false; // Controla si ya se hizo el primer toque
    
    // Configurar volumen inicial
    bgMusic.volume = volumeSlider.value / 100;

    // Actualizar volumen al mover el control (afecta la música y los efectos)
    volumeSlider.addEventListener('input', () => {
        bgMusic.volume = volumeSlider.value / 100;
    });

    // Botón para pausar/reproducir la música de fondo
    musicToggleBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        if (!musicHasStarted) return; // Si no ha tocado nada aún, no hace nada

        if (bgMusic.paused) {
            bgMusic.play();
            musicToggleBtn.innerText = 'Música: Sonando ⏸️';
        } else {
            bgMusic.pause();
            musicToggleBtn.innerText = 'Música: Pausada ▶️';
        }
    });
    
    const cycleTexts = ["Inhala...", "Mantén...", "Exhala...", "Mantén..."];
    const cycleScales = [2.5, 2.5, 1, 1]; 
    let cycleIndex = 0;

    function updateBreathingUI() {
        textElement.innerText = cycleTexts[cycleIndex];
        circleElement.style.transform = `scale(${cycleScales[cycleIndex]})`;
        circleElement.style.opacity = cycleScales[cycleIndex] > 1 ? '0.8' : '0.3';
    }

    function startBreathing() {
        cycleIndex = 0;
        statusText.innerText = "Sigue el ritmo del color azul.";
        updateBreathingUI(); 
        
        breathingInterval = setInterval(() => {
            cycleIndex = (cycleIndex + 1) % cycleTexts.length;
            updateBreathingUI();
        }, 3000); 
    }

    function stopBreathing() {
        clearInterval(breathingInterval);
        textElement.innerText = "Descansando...";
        statusText.innerText = "Mantén presionado un botón para comenzar.";
        circleElement.style.transform = "scale(1)";
        circleElement.style.opacity = "0.3";
    }

    function createRainDrop(emoji) {
        const drop = document.createElement('div');
        drop.innerText = emoji;
        drop.classList.add('rain-drop');
        drop.style.left = Math.random() * 100 + 'vw';
        
        const size = Math.random() * 50 + 40; 
        drop.style.fontSize = size + 'px';
        
        const duration = Math.random() * 3 + 3;
        drop.style.animationDuration = duration + 's';
        
        document.body.appendChild(drop);

        setTimeout(() => {
            if (drop.parentNode) drop.parentNode.removeChild(drop);
        }, duration * 1000);
    }

    function startRain(emoji) {
        createRainDrop(emoji); 
        rainInterval = setInterval(() => createRainDrop(emoji), 300);
    }

    function stopRain() {
        clearInterval(rainInterval);
    }

    const soundProfiles = {
        '🫧': { type: 'sine', f1: 600, f2: 800, dur: 0.1 },
        '🍃': { type: 'triangle', f1: 300, f2: 150, dur: 0.3 },
        '✨': { type: 'sine', f1: 1200, f2: 1200, dur: 0.5 },
        '💧': { type: 'sine', f1: 800, f2: 200, dur: 0.15 },
        '☁️': { type: 'square', f1: 120, f2: 100, dur: 0.4 },
        '🌙': { type: 'sine', f1: 400, f2: 400, dur: 0.8 }
    };

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(emoji) {
        initAudio(); 
        
        const profile = soundProfiles[emoji] || soundProfiles['🫧'];
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        // El sonido del emoji será ligeramente más bajo que el volumen general para no tapar la música
        const maxVolume = parseFloat(volumeSlider.value) / 100 * 0.15; 

        osc.type = profile.type;
        osc.frequency.setValueAtTime(profile.f1, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(profile.f2, audioCtx.currentTime + profile.dur);

        gain.gain.setValueAtTime(maxVolume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + profile.dur);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + profile.dur);
    }

    buttons.forEach(btn => {
        const emoji = btn.innerText.trim();

        const handlePress = (e) => {
            e.preventDefault(); 
            
            // Iniciar la música de fondo automáticamente en el primer toque
            if (!musicHasStarted) {
                bgMusic.play().catch(err => console.log("Auto-play prevenido", err));
                musicHasStarted = true;
                musicToggleBtn.innerText = 'Música: Sonando ⏸️';
            }

            if (isHolding) return;
            isHolding = true;
            btn.classList.add('active');
            
            playSound(emoji);
            startBreathing();
            startRain(emoji);
        };

        const handleRelease = (e) => {
            e.preventDefault();
            if (!isHolding) return;
            isHolding = false;
            btn.classList.remove('active');
            
            stopBreathing();
            stopRain();
        };

        btn.addEventListener('pointerdown', handlePress);
        btn.addEventListener('pointerup', handleRelease);
        btn.addEventListener('pointerleave', handleRelease); 
        btn.addEventListener('pointercancel', handleRelease);
        btn.addEventListener('contextmenu', e => e.preventDefault());
    });

</script>

</body>
</html>
