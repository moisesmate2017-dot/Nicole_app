<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espacio de Calma</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --shadow: #a3b1c6;
            --light: #ffffff;
            --accent: #89b4fa;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #4a5568;
            overflow: hidden; 
            /* Evita el comportamiento predeterminado del navegador al tocar */
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 10; 
        }

        h1 { 
            font-weight: 300; 
            opacity: 0.8; 
            height: 40px; 
            transition: opacity 0.5s;
        }

        .card {
            background: var(--bg);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow), 
                       -9px -9px 16px var(--light);
            margin-bottom: 2rem;
        }

        .breathing-circle {
            width: 150px;
            height: 150px;
            margin: 2rem auto;
            background: var(--bg);
            border-radius: 50%;
            box-shadow: inset 6px 6px 12px var(--shadow), 
                        inset -6px -6px 12px var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .inner-circle {
            width: 40%;
            height: 40%;
            background: var(--accent);
            border-radius: 50%;
            filter: blur(8px);
            transition: transform 3s ease-in-out, opacity 3s ease-in-out;
            transform: scale(1);
            opacity: 0.3;
        }

        .fidget-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .fidget-btn {
            width: 100%;
            padding: 20px 0;
            border: none;
            border-radius: 15px;
            background: var(--bg);
            box-shadow: 5px 5px 10px var(--shadow), 
                       -5px -5px 10px var(--light);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.5rem; 
            /* Esto elimina el recuadro gris feo de tu captura */
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .fidget-btn.active {
            box-shadow: inset 3px 3px 6px var(--shadow), 
                        inset -3px -3px 6px var(--light);
            transform: scale(0.95);
        }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            opacity: 0.6;
            font-size: 0.9rem;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 60%;
            background: transparent;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-runnable-track {
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            box-shadow: inset 2px 2px 5px var(--shadow), 
                        inset -2px -2px 5px var(--light);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 2px 2px 5px var(--shadow);
        }

        .rain-drop {
            position: fixed;
            top: -50px;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1 id="instruction">Descansando...</h1>
        <div class="breathing-circle">
            <div class="inner-circle" id="inner-circle"></div>
        </div>
        <p class="status-text" id="status-text">Mantén presionado un botón para comenzar.</p>
    </div>

    <div class="card">
        <p>Panel Sensorial</p>
        <div class="fidget-grid">
            <button class="fidget-btn">🫧</button>
            <button class="fidget-btn">🍃</button>
            <button class="fidget-btn">✨</button>
            <button class="fidget-btn">💧</button>
            <button class="fidget-btn">☁️</button>
            <button class="fidget-btn">🌙</button>
        </div>
        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volume-slider" min="1" max="100" value="50">
            <span>🔊</span>
        </div>
    </div>
</div>

<script>
    const textElement = document.getElementById('instruction');
    const statusText = document.getElementById('status-text');
    const circleElement = document.getElementById('inner-circle');
    const buttons = document.querySelectorAll('.fidget-btn');
    const volumeSlider = document.getElementById('volume-slider');

    let isHolding = false;
    let breathingInterval = null;
    let rainInterval = null;
    let audioCtx = null; // No lo inicializamos aquí para evitar bloqueos
    
    const cycleTexts = ["Inhala...", "Mantén...", "Exhala...", "Mantén..."];
    const cycleScales = [2.5, 2.5, 1, 1]; 
    let cycleIndex = 0;

    function updateBreathingUI() {
        textElement.innerText = cycleTexts[cycleIndex];
        circleElement.style.transform = `scale(${cycleScales[cycleIndex]})`;
        circleElement.style.opacity = cycleScales[cycleIndex] > 1 ? '0.8' : '0.3';
    }

    function startBreathing() {
        cycleIndex = 0;
        statusText.innerText = "Sigue el ritmo del color azul.";
        updateBreathingUI(); 
        
        breathingInterval = setInterval(() => {
            cycleIndex = (cycleIndex + 1) % cycleTexts.length;
            updateBreathingUI();
        }, 3000); 
    }

    function stopBreathing() {
        clearInterval(breathingInterval);
        textElement.innerText = "Descansando...";
        statusText.innerText = "Mantén presionado un botón para comenzar.";
        circleElement.style.transform = "scale(1)";
        circleElement.style.opacity = "0.3";
    }

    function createRainDrop(emoji) {
        const drop = document.createElement('div');
        drop.innerText = emoji;
        drop.classList.
