<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espacio de Calma</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --shadow: #a3b1c6;
            --light: #ffffff;
            --accent: #89b4fa;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #4a5568;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 { 
            font-weight: 300; 
            opacity: 0.8; 
            height: 40px; /* Mantiene la altura para evitar saltos */
        }

        .card {
            background: var(--bg);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow), 
                       -9px -9px 16px var(--light);
            margin-bottom: 2rem;
        }

        .breathing-circle {
            width: 150px;
            height: 150px;
            margin: 2rem auto;
            background: var(--bg);
            border-radius: 50%;
            box-shadow: inset 6px 6px 12px var(--shadow), 
                        inset -6px -6px 12px var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .inner-circle {
            width: 40%;
            height: 40%;
            background: var(--accent);
            border-radius: 50%;
            /* 8 segundos en total para coincidir con los 4 pasos de 2 segundos del JS */
            animation: breathe 8s linear infinite;
            filter: blur(8px);
        }

        /* Animación sincronizada con el patrón de caja (4 fases iguales) */
        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.5; }        /* Inicia Inhalación */
            25% { transform: scale(2.5); opacity: 0.8; }     /* Fin Inhalación / Inicia Mantener */
            50% { transform: scale(2.5); opacity: 0.8; }     /* Fin Mantener / Inicia Exhalación */
            75% { transform: scale(1); opacity: 0.5; }       /* Fin Exhalación / Inicia Descanso */
            100% { transform: scale(1); opacity: 0.5; }      /* Fin Descanso / Reinicia */
        }

        .fidget-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .fidget-btn {
            width: 100%;
            padding: 20px 0;
            border: none;
            border-radius: 15px;
            background: var(--bg);
            box-shadow: 5px 5px 10px var(--shadow), 
                       -5px -5px 10px var(--light);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.2rem;
        }

        .fidget-btn:active {
            box-shadow: inset 3px 3px 6px var(--shadow), 
                        inset -3px -3px 6px var(--light);
            transform: scale(0.95);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 20px 0;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-runnable-track {
            height: 10px;
            background: var(--bg);
            border-radius: 5px;
            box-shadow: inset 2px 2px 5px var(--shadow), 
                        inset -2px -2px 5px var(--light);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 25px;
            width: 25px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 2px 2px 5px var(--shadow);
        }

        .status-text {
            font-size: 0.9rem;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1 id="instruction">Inhala...</h1>
        <div class="breathing-circle">
            <div class="inner-circle"></div>
        </div>
        <p class="status-text">Sigue el ritmo del color azul.</p>
    </div>

    <div class="card">
        <p>Panel Sensorial (Haz clic)</p>
        <div class="fidget-grid">
            <button class="fidget-btn" onclick="playPop()">🫧</button>
            <button class="fidget-btn" onclick="playPop()">🍃</button>
            <button class="fidget-btn" onclick="playPop()">✨</button>
            <button class="fidget-btn" onclick="playPop()">💧</button>
            <button class="fidget-btn" onclick="playPop()">☁️</button>
            <button class="fidget-btn" onclick="playPop()">🌙</button>
        </div>
        <input type="range" min="1" max="100" value="50">
    </div>
</div>

<script>
    const textElement = document.getElementById('instruction');
    const instructions = ["Inhala...", "Mantén...", "Exhala...", "Descansa..."];
    let index = 1; // Empezamos en 1 porque el HTML ya dice "Inhala..."

    setInterval(() => {
        textElement.innerText = instructions[index];
        index = (index + 1) % instructions.length;
    }, 2000);

    function playPop() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);

        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    }
</script>

</body>
</html>
